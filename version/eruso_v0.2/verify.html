<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>약국 포털 검증 - 조치원 스마트 약배송</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container" style="padding: 2rem;">
        <h1>약국 포털 완료 건수 검증</h1>
        
        <div class="card">
            <h2>테스트 시나리오</h2>
            <ol style="line-height: 2;">
                <li>test.html에서 샘플 데이터 추가</li>
                <li>병원으로 로그인하여 처방전 발행</li>
                <li>약국으로 로그인하여 처방전 접수 → 조제 → 배송 → 완료</li>
                <li>약국 포털 대시보드에서 "완료" 카드 확인</li>
                <li>약국 포털 "완료" 탭에서 배지 및 목록 확인</li>
            </ol>
        </div>

        <div class="card">
            <h2>현재 데이터 확인</h2>
            <div id="verifyResults"></div>
            <button class="btn btn-primary" onclick="verifyData()">데이터 검증</button>
        </div>

        <div class="card">
            <h2>완료 처방전 생성 (테스트용)</h2>
            <p>기존 처방전을 완료 상태로 변경합니다.</p>
            <button class="btn btn-success" onclick="createCompletedPrescription()">완료 처방전 생성</button>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script>
        async function verifyData() {
            const resultsDiv = document.getElementById('verifyResults');
            resultsDiv.innerHTML = '<div class="spinner"></div><p>데이터 확인 중...</p>';
            
            try {
                // 1. 약국 정보 가져오기
                const pharmaciesData = await fetchTableData('pharmacies');
                const pharmacy = pharmaciesData?.data?.[0]; // 첫 번째 약국

                if (!pharmacy) {
                    resultsDiv.innerHTML = '<p style="color: red;">❌ 약국 정보를 찾을 수 없습니다. test.html에서 샘플 데이터를 추가하세요.</p>';
                    return;
                }

                // 2. 모든 처방전 가져오기
                const prescriptionsData = await fetchTableData('prescriptions');
                const allPrescriptions = prescriptionsData?.data || [];

                // 3. 약국의 처방전만 필터링
                const pharmacyPrescriptions = allPrescriptions.filter(p => p.pharmacy_id === pharmacy.id);

                // 4. 상태별 카운트
                const newCount = pharmacyPrescriptions.filter(p => p.status === 'issued' || p.status === 'received').length;
                const preparingCount = pharmacyPrescriptions.filter(p => p.status === 'preparing').length;
                const deliveringCount = pharmacyPrescriptions.filter(p => p.status === 'delivering').length;
                const completedCount = pharmacyPrescriptions.filter(p => p.status === 'completed').length;

                let html = '<div style="font-family: monospace; font-size: 0.9rem;">';
                html += `<p><strong>약국 정보:</strong></p>`;
                html += `<ul style="margin-left: 1.5rem;">`;
                html += `<li>약국명: ${pharmacy.name}</li>`;
                html += `<li>약국 ID: ${pharmacy.id.substring(0, 8)}</li>`;
                html += `</ul>`;

                html += `<p style="margin-top: 1.5rem;"><strong>처방전 통계:</strong></p>`;
                html += `<ul style="margin-left: 1.5rem;">`;
                html += `<li>전체 처방전: ${allPrescriptions.length}개</li>`;
                html += `<li>이 약국의 처방전: ${pharmacyPrescriptions.length}개</li>`;
                html += `<li style="color: #2563eb;">신규: ${newCount}개</li>`;
                html += `<li style="color: #f59e0b;">조제중: ${preparingCount}개</li>`;
                html += `<li style="color: #8b5cf6;">배송중: ${deliveringCount}개</li>`;
                html += `<li style="color: #10b981;"><strong>완료: ${completedCount}개</strong></li>`;
                html += `</ul>`;

                if (completedCount > 0) {
                    html += `<p style="margin-top: 1.5rem;"><strong>완료된 처방전 목록:</strong></p>`;
                    html += `<ul style="margin-left: 1.5rem; font-size: 0.85rem;">`;
                    pharmacyPrescriptions
                        .filter(p => p.status === 'completed')
                        .forEach(p => {
                            html += `<li>${p.id.substring(0, 8)} - ${p.patient_name} - ${formatDateShort(p.issued_at)}</li>`;
                        });
                    html += `</ul>`;
                } else {
                    html += `<p style="margin-top: 1.5rem; color: #f59e0b;">⚠️ 완료된 처방전이 없습니다.</p>`;
                }

                html += '</div>';
                resultsDiv.innerHTML = html;

            } catch (error) {
                resultsDiv.innerHTML = `<p style="color: red;">❌ 에러: ${error.message}</p>`;
            }
        }

        async function createCompletedPrescription() {
            if (!confirm('테스트용 완료 처방전을 생성하시겠습니까?')) return;

            try {
                // 약국 정보 가져오기
                const pharmaciesData = await fetchTableData('pharmacies');
                const pharmacy = pharmaciesData?.data?.[0];

                if (!pharmacy) {
                    alert('약국 정보를 찾을 수 없습니다.');
                    return;
                }

                // 환자 정보 가져오기
                const usersData = await fetchTableData('users');
                const patient = usersData?.data?.find(u => u.role === 'patient');

                if (!patient) {
                    alert('환자 정보를 찾을 수 없습니다.');
                    return;
                }

                // 병원 정보 가져오기
                const hospitalsData = await fetchTableData('hospitals');
                const hospital = hospitalsData?.data?.[0];

                if (!hospital) {
                    alert('병원 정보를 찾을 수 없습니다.');
                    return;
                }

                // 완료된 처방전 생성
                const prescriptionId = generateUUID();
                const prescription = {
                    id: prescriptionId,
                    patient_id: patient.id,
                    patient_name: patient.name,
                    hospital_id: hospital.id,
                    hospital_name: hospital.name,
                    doctor_name: '이의사',
                    medicines: JSON.stringify([
                        { name: '테스트 약물', dosage: '1일 2회', days: 7 }
                    ]),
                    diagnosis: '테스트 진단',
                    notes: '테스트용 완료 처방전',
                    status: 'completed',
                    pharmacy_id: pharmacy.id,
                    issued_at: new Date(Date.now() - 86400000 * 3).toISOString(), // 3일 전
                    created_at: new Date(Date.now() - 86400000 * 3).toISOString()
                };

                await createRecord('prescriptions', prescription);

                // 배송 정보도 생성
                const delivery = {
                    id: generateUUID(),
                    prescription_id: prescriptionId,
                    patient_id: patient.id,
                    pharmacy_id: pharmacy.id,
                    delivery_address: patient.address,
                    recipient_name: patient.name,
                    recipient_phone: patient.phone,
                    status: 'delivered',
                    delivery_notes: '테스트용 배송 완료',
                    qr_code: `PRESCRIPTION:${prescriptionId}:${Date.now()}`,
                    delivered_at: new Date().toISOString(),
                    created_at: new Date(Date.now() - 86400000 * 3).toISOString()
                };

                await createRecord('deliveries', delivery);

                alert('✅ 완료 처방전이 생성되었습니다!');
                await verifyData();

            } catch (error) {
                alert('❌ 에러: ' + error.message);
                console.error(error);
            }
        }

        // 페이지 로드 시 자동으로 검증
        document.addEventListener('DOMContentLoaded', () => {
            verifyData();
        });
    </script>
</body>
</html>
